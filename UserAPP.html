<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA-App</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        .message { padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        #aktivierungView, #hauptView { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">⚡ MA-App</h2>
        
        <!-- LOGIN -->
        <div id="loginView">
            <h3>Mitarbeiter-Login</h3>
            <input type="text" id="pnr" placeholder="Personalnummer">
            <input type="password" id="passwort" placeholder="Passwort">
            <button onclick="login()">Anmelden</button>
            <button onclick="zeigeAktivierung()">Noch nicht aktiviert?</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- AKTIVIERUNG -->
        <div id="aktivierungView">
            <h3>Passwort festlegen</h3>
            <input type="text" id="aktivPnr" placeholder="Personalnummer" readonly>
            <input type="password" id="neuPasswort" placeholder="Neues Passwort">
            <input type="password" id="neuPasswort2" placeholder="Wiederholen">
            <button onclick="aktivieren()">Aktivieren</button>
            <button onclick="zeigeLogin()">Zurück</button>
            <div id="aktivMessage" class="message"></div>
        </div>
    </div>

    <script>
        const serverUrl = 'https://mitarbeiter-api.xrisxan.workers.dev';
        
        function zeigeLogin() {
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('aktivierungView').style.display = 'none';
        }
        
        function zeigeAktivierung() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('aktivierungView').style.display = 'block';
        }
        
        function zeigeMeldung(id, text, typ) {
            const msg = document.getElementById(id);
            msg.textContent = text;
            msg.className = 'message ' + typ;
        }

        async function login() {
            const pnr = document.getElementById('pnr').value;
            const passwort = document.getElementById('passwort').value;
            
            if (!pnr || !passwort) {
                zeigeMeldung('loginMessage', 'Bitte alles ausfüllen!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${serverUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pnr, passwort })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    zeigeMeldung('loginMessage', 'Login erfolgreich!', 'success');
                } else {
                    zeigeMeldung('loginMessage', 'Falsches Passwort!', 'error');
                }
            } catch (error) {
                zeigeMeldung('loginMessage', 'Fehler: ' + error.message, 'error');
            }
        }

        async function aktivieren() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const pnr = document.getElementById('aktivPnr').value;
            const pw1 = document.getElementById('neuPasswort').value;
            const pw2 = document.getElementById('neuPasswort2').value;
            
            if (!token || !pnr) {
                zeigeMeldung('aktivMessage', 'Kein gültiger Link!', 'error');
                return;
            }
            
            if (pw1 !== pw2 || pw1.length < 6) {
                zeigeMeldung('aktivMessage', 'Passwort-Fehler!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${serverUrl}/api/aktivieren`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, passwort: pw1 })
                });
                
                if (response.ok) {
                    zeigeMeldung('aktivMessage', 'Aktivierung erfolgreich!', 'success');
                }
            } catch (error) {
                zeigeMeldung('aktivMessage', 'Fehler: ' + error.message, 'error');
            }
        }

        // Beim Laden prüfen
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const pnr = urlParams.get('pnr');
            
            if (token && pnr) {
                document.getElementById('aktivPnr').value = pnr;
                zeigeAktivierung();
            } else if (pnr) {
                document.getElementById('pnr').value = pnr;
            }
        });
    </script>
</body>
</html>
