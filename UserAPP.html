<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MA-App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: max-width 0.3s ease;
        }
        
        /* Schmaler Modus (für Login/Aktivierung) */
        .container.schmal {
            max-width: 300px;
        }
        
        /* Breiter Modus (für Schichtplan) */
        .container.breit {
            max-width: 1300px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        input[readonly] { background-color: #f5f5f5; color: #666; cursor: not-allowed; }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s; margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        button.link-button { background: transparent; color: #667eea; box-shadow: none; }
        .message {
            margin-top: 20px; padding: 12px; border-radius: 10px; text-align: center;
            font-size: 14px; display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container schmal">
        <div class="header">
            <h1>⚡ MA-App</h1>
            <p>Mitarbeiter-Portal</p>
        </div>
        
        <div class="content">
            <!-- LOGIN VIEW -->
            <div id="loginView">
                <h2 style="margin-bottom: 20px;">👤 Mitarbeiter-Login</h2>
                <div class="form-group">
                    <label>Personalnummer</label>
                    <input type="text" id="pnr" readonly>
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="passwort" placeholder="Passwort eingeben">
                </div>
                <button onclick="login()">Anmelden</button>
                <button class="link-button" onclick="zeigeAktivierung()">Noch nicht aktiviert?</button>
                <div id="loginMessage" class="message"></div>
            </div>

            <!-- AKTIVIERUNG VIEW -->
            <div id="aktivierungView" style="display: none;">
                <h2 style="margin-bottom: 20px;">🔐 Passwort festlegen</h2>
                <div class="form-group">
                    <label>Personalnummer</label>
                    <input type="text" id="aktivPnr" readonly>
                </div>
                <div class="form-group">
                    <label>Neues Passwort</label>
                    <input type="password" id="neuPasswort" placeholder="mind. 6 Zeichen">
                </div>
                <div class="form-group">
                    <label>Passwort wiederholen</label>
                    <input type="password" id="neuPasswort2" placeholder="Passwort wiederholen">
                </div>
                <button onclick="aktivieren()">✅ Aktivieren</button>
                <button class="link-button" onclick="zeigeLogin()">← Zurück zum Login</button>
                <div id="aktivMessage" class="message"></div>
            </div>

            <!-- HAUPTANSICHT -->
            <div id="hauptView" style="display: none;">
                <h2 style="margin-bottom: 20px;">📅 Meine Schichten</h2>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <button onclick="vorherigeWoche()" style="width: 30%; padding: 8px;">← Vorherige</button>
                    <span style="font-weight: bold; padding: 8px;">KW <span id="kwWert">10</span>/<span id="jahrWert">2026</span></span>
                    <button onclick="naechsteWoche()" style="width: 30%; padding: 8px;">Nächste →</button>
                </div>
                <div id="schichtenContainer">
                    <p style="text-align: center; color: #999;">Keine Schichten geladen</p>
                </div>
                <div id="hauptMessage" class="message"></div>
                <button class="link-button" onclick="logout()" style="margin-top: 20px;">🚪 Abmelden</button>
            </div>
        </div>
    </div>

    <script>
        const serverUrl = 'https://script.google.com/macros/s/AKfycbw-UzedOHNYrjGYEnWompgULL35FPa6Y_TkP1JRyB-5UBL3iDC_1COz-T9IQzI2kmG3/exec';
        let aktuellerMitarbeiter = null;
        let aktuelleKW = 10;
        let aktuellesJahr = 2026;

        // ============================================================
        // VIEWS
        // ============================================================
        function zeigeMeldung(id, text, typ) {
            const msg = document.getElementById(id);
            if (msg) {
                msg.textContent = text;
                msg.className = 'message ' + typ;
            }
        }

        function zeigeLogin() {
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('aktivierungView').style.display = 'none';
            document.getElementById('hauptView').style.display = 'none';
            document.querySelector('.container').classList.remove('breit');
            document.querySelector('.container').classList.add('schmal');
        }
        
        function zeigeAktivierung() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('aktivierungView').style.display = 'block';
            document.getElementById('hauptView').style.display = 'none';
            document.querySelector('.container').classList.remove('breit');
            document.querySelector('.container').classList.add('schmal');
        }
        
        function zeigeHauptansicht() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('aktivierungView').style.display = 'none';
            document.getElementById('hauptView').style.display = 'block';
            document.querySelector('.container').classList.remove('schmal');
            document.querySelector('.container').classList.add('breit');
        }

        // ============================================================
        // LOGIN
        // ============================================================
        async function login() {
          const pnr = document.getElementById('pnr').value;
          const passwort = document.getElementById('passwort').value;
        
          try {
            const response = await fetch(`${serverUrl}?action=login`, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ pnr, passwort })
            });
        
            const data = await response.json();
            console.log('Login-Antwort:', data); // Zum Debuggen
        
            if (data.success) {
              aktuellerMitarbeiter = data.mitarbeiter;
              zeigeHauptansicht();
            } else {
              zeigeMeldung('loginMessage', '❌ Falsches Passwort!', 'error');
            }
          } catch (error) {
            console.error('Fehler:', error);
            zeigeMeldung('loginMessage', 'Fehler: ' + error.message, 'error');
          }
        }

        // ============================================================
        // AKTIVIERUNG
        // ============================================================
        async function aktivieren() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const pnr = document.getElementById('aktivPnr').value;
            const pw1 = document.getElementById('neuPasswort').value;
            const pw2 = document.getElementById('neuPasswort2').value;

            if (!token || !pnr) {
                zeigeMeldung('aktivMessage', '❌ Kein gültiger Link!', 'error');
                return;
            }

            if (pw1.length < 6 || pw1 !== pw2) {
                zeigeMeldung('aktivMessage', '❌ Passwort-Fehler!', 'error');
                return;
            }

            try {
                const response = await fetch(`${serverUrl}/api/aktivieren`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, passwort: pw1 })
                });

                if (response.ok) {
                    zeigeMeldung('aktivMessage', '✅ Aktivierung erfolgreich!', 'success');
                    setTimeout(() => window.location.href = `/?pnr=${pnr}`, 2000);
                }
            } catch (error) {
                zeigeMeldung('aktivMessage', 'Fehler: ' + error.message, 'error');
            }
        }

        // ============================================================
        // SCHICHTPLAN
        // ============================================================
        async function ladeSchichtplan(kw, jahr) {
          if (!aktuellerMitarbeiter) {
            zeigeMeldung('hauptMessage', '❌ Kein Mitarbeiter eingeloggt', 'error');
            return;
          }
        
          try {
            const response = await fetch(`${serverUrl}?action=schichten&mitarbeiterId=${aktuellerMitarbeiter.id}&kw=${kw}&jahr=${jahr}`);
            
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.success && data.schichten) {
              zeigeSchichten(data.schichten);
              zeigeMeldung('hauptMessage', '', 'success');
            } else {
              zeigeMeldung('hauptMessage', '❌ Keine Schichten gefunden', 'error');
            }
          } catch (error) {
            zeigeMeldung('hauptMessage', 'Fehler: ' + error.message, 'error');
          }
        }

        function zeigeSchichten(schichten) {
            let html = '<div style="display: flex; flex-direction: row; gap: 10px; overflow-x: auto; padding: 10px 0;">';
            
            schichten.forEach(s => {
                // Funktion zum Extrahieren der Uhrzeit aus dem Google-Zeitformat
                function extrahiereUhrzeit(zeitString) {
                    if (!zeitString) return '';
                    
                    // Fall 1: ISO-String von Google Sheets (1899-12-30T05:00:00.000Z)
                    if (zeitString.includes('T')) {
                        const match = zeitString.match(/T(\d{2}):(\d{2})/);
                        if (match) {
                            return match[1] + ':' + match[2];
                        }
                    }
                    
                    // Fall 2: Normales Format (06:00)
                    if (zeitString.includes(':')) {
                        return zeitString;
                    }
                    
                    return '';
                }
        
                html += `
                    <div style="min-width: 130px; background: white; border-radius: 10px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        <div style="text-align: center; font-weight: bold; border-bottom: 2px solid #667eea; padding-bottom: 5px; margin-bottom: 8px;">
                            ${s.tag}
                            <div style="font-size: 11px; color: #666;">${s.datum}</div>
                        </div>
                `;
        
                // Frühschicht
                if (s.frueh?.hatSchicht) {
                    const von = extrahiereUhrzeit(s.frueh.von);
                    const bis = extrahiereUhrzeit(s.frueh.bis);
                    const fahrzeug = s.frueh.fahrzeug || '';
                    
                    html += `
                        <div style="background: #e3f2fd; border-radius: 5px; padding: 6px; margin-bottom: 5px; font-size: 12px;">
                            <div style="font-weight: bold;">🌅 Früh</div>
                            <div>${von} - ${bis}</div>
                            <div style="font-size: 10px; color: #555; margin-top: 3px;">${fahrzeug}</div>
                        </div>
                    `;
                }
        
                // Spätschicht
                if (s.spaet?.hatSchicht) {
                    const von = extrahiereUhrzeit(s.spaet.von);
                    const bis = extrahiereUhrzeit(s.spaet.bis);
                    const fahrzeug = s.spaet.fahrzeug || '';
                    
                    html += `
                        <div style="background: #fff3e0; border-radius: 5px; padding: 6px; margin-bottom: 5px; font-size: 12px;">
                            <div style="font-weight: bold;">🌇 Spät</div>
                            <div>${von} - ${bis}</div>
                            <div style="font-size: 10px; color: #555; margin-top: 3px;">${fahrzeug}</div>
                        </div>
                    `;
                }
        
                // Frei
                if (!s.frueh?.hatSchicht && !s.spaet?.hatSchicht) {
                    html += `<div style="background: #f5f5f5; border-radius: 5px; padding: 12px; text-align: center; color: #999; font-size: 12px;">🆓 Frei</div>`;
                }
        
                html += `</div>`;
            });
        
            html += `</div>`;
            document.getElementById('schichtenContainer').innerHTML = html;
        }

        function vorherigeWoche() {
            aktuelleKW--;
            if (aktuelleKW < 1) { aktuelleKW = 52; aktuellesJahr--; }
            document.getElementById('kwWert').textContent = aktuelleKW;
            document.getElementById('jahrWert').textContent = aktuellesJahr;
            ladeSchichtplan(aktuelleKW, aktuellesJahr);
        }

        function naechsteWoche() {
            aktuelleKW++;
            if (aktuelleKW > 52) { aktuelleKW = 1; aktuellesJahr++; }
            document.getElementById('kwWert').textContent = aktuelleKW;
            document.getElementById('jahrWert').textContent = aktuellesJahr;
            ladeSchichtplan(aktuelleKW, aktuellesJahr);
        }

        function logout() {
            aktuellerMitarbeiter = null;
            localStorage.removeItem('token');
            zeigeLogin();
            document.getElementById('passwort').value = '';
        }

        // ============================================================
        // INIT
        // ============================================================
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const pnr = urlParams.get('pnr');

            if (token && pnr) {
                document.getElementById('aktivPnr').value = pnr;
                zeigeAktivierung();
            } else if (pnr) {
                document.getElementById('pnr').value = pnr;
                zeigeLogin();
            }
        });
    </script>
</body>
</html>
